name: .NET Core Desktop

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore PocketMC.Desktop.sln

    - name: Build Configuration Debug
      run: dotnet build PocketMC.Desktop.sln --configuration Debug --no-restore

    - name: Build Configuration Release
      run: dotnet build PocketMC.Desktop.sln --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test PocketMC.Desktop.sln --configuration Release --no-build

    - name: Publish App
      run: dotnet publish PocketMC.Desktop\PocketMC.Desktop.csproj -c Release -r win-x64 -p:PublishSingleFile=true -p:PublishReadyToRun=true --self-contained false -o publish_output
      
    - name: Create Installer using Inno Setup
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss

    - name: Upload Setup.exe Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PocketMC_Setup
        path: ReleaseOutput\PocketMC_Setup.exe
